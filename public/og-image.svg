<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Subtle vignette so corners read slightly deeper -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#003399" stop-opacity="0"/>
      <stop offset="100%" stop-color="#001E5C" stop-opacity="0.55"/>
    </radialGradient>
    <!-- Backdrop EU stars: faint gold, decorative -->
    <g id="euStar">
      <!-- 5-point star, radius 1 -->
      <polygon points="0,-1 0.2245,-0.309 0.951,-0.309 0.363,0.118 0.588,0.809 0,0.382 -0.588,0.809 -0.363,0.118 -0.951,-0.309 -0.2245,-0.309" />
    </g>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#003399"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Decorative EU star ring, upper-right, very subtle (5% opacity) -->
  <!-- Ring centered at (980, 200) with radius 220 -->
  <g transform="translate(980,200)" opacity="0.10" fill="#FFCC00">
    <!-- 12 stars at 30° intervals around the circle -->
    <use href="#euStar" transform="translate(0,-220) scale(28)"/>
    <use href="#euStar" transform="rotate(30) translate(0,-220) scale(28)"/>
    <use href="#euStar" transform="rotate(60) translate(0,-220) scale(28)"/>
    <use href="#euStar" transform="rotate(90) translate(0,-220) scale(28)"/>
    <use href="#euStar" transform="rotate(120) translate(0,-220) scale(28)"/>
    <use href="#euStar" transform="rotate(150) translate(0,-220) scale(28)"/>
    <use href="#euStar" transform="rotate(180) translate(0,-220) scale(28)"/>
    <use href="#euStar" transform="rotate(210) translate(0,-220) scale(28)"/>
    <use href="#euStar" transform="rotate(240) translate(0,-220) scale(28)"/>
    <use href="#euStar" transform="rotate(270) translate(0,-220) scale(28)"/>
    <use href="#euStar" transform="rotate(300) translate(0,-220) scale(28)"/>
    <use href="#euStar" transform="rotate(330) translate(0,-220) scale(28)"/>
  </g>

  <!-- Compact gold star monogram at top-left as visual anchor -->
  <g transform="translate(80,90)" fill="#FFCC00">
    <use href="#euStar" transform="translate(0,0) scale(20)"/>
    <use href="#euStar" transform="translate(56,0) scale(20)"/>
    <use href="#euStar" transform="translate(112,0) scale(20)"/>
  </g>

  <!-- Eyebrow tag -->
  <text x="80" y="180"
        font-family="Manrope, -apple-system, sans-serif"
        font-size="20" font-weight="600" letter-spacing="4"
        fill="#FFCC00">
    EU VISA PATHWAY FINDER
  </text>

  <!-- Wordmark: Move Me To EU (Fraunces serif) -->
  <text x="80" y="305"
        font-family="Fraunces, Georgia, serif"
        font-size="116" font-weight="600" letter-spacing="-3"
        fill="#FFFFFF">
    Move Me To EU
  </text>

  <!-- Gold accent rule -->
  <rect x="80" y="345" width="120" height="6" fill="#FFCC00"/>

  <!-- Tagline -->
  <text x="80" y="412"
        font-family="Manrope, -apple-system, sans-serif"
        font-size="34" font-weight="500"
        fill="#F5EFD9">
    Find your visa pathway to Europe.
  </text>
  <text x="80" y="456"
        font-family="Manrope, -apple-system, sans-serif"
        font-size="22" font-weight="400"
        fill="#C7D3F2">
    Compare 27 EU countries on cost, healthcare, safety, and 9 visa types.
  </text>

  <!-- Footer URL bar -->
  <rect x="0" y="568" width="1200" height="62" fill="#001E5C"/>
  <text x="80" y="608"
        font-family="Manrope, -apple-system, sans-serif"
        font-size="22" font-weight="700" letter-spacing="1"
        fill="#FFCC00">
    movemeto.eu
  </text>
  <text x="1120" y="608" text-anchor="end"
        font-family="Manrope, -apple-system, sans-serif"
        font-size="16" font-weight="500" letter-spacing="2"
        fill="#A9B7E0">
    FREE · NO SIGNUP · DATA-DRIVEN
  </text>
</svg>
